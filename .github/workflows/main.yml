name: Download BAAD

on:
  workflow_dispatch:

jobs:
  run-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest release ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --pattern "*windows*.zip" --dir ./downloads --repo Deathemonic/BA-AD

      - name: Extract ZIP
        run: |
          powershell -command "Expand-Archive -Path ./downloads/*.zip -DestinationPath ./extract -Force"

      - name: Find and run EXE
        run: |
          $exePath = Get-ChildItem -Path ./extract -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Running: $($exePath.FullName)"
            & $exePath.FullName download japan --tables
          } else {
            Write-Error "No EXE found in extracted files"
            exit 1
          }
        shell: pwsh
        
      - name: Upload results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $branch = Get-Date -Format "yyyy-MM-dd-HHmmss"
          Write-Host "Creating new brach from timestamp"
          git checkout --orphan $branch
          git rm -rf .   # 清空工作区（若需要全新分支）

          $files = Get-ChildItem -Path ./output/TableBundles -Recurse -Filter "*.zip"
          if ($files.Count -eq 0) {
            Write-Host "No files found matching pattern $pattern, skipping commit."
            exit 0
          }
          foreach ($zip in $files) {
            git add $zip
          }

          # 检查是否有变更
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Update generated files from EXE run [skip ci]"
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin $branch
          } else {
            Write-Host "No changes to commit."
          }

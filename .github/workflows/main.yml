name: Download BAAD

on:
  workflow_dispatch:  # 手动触发，方便测试

jobs:
  run-exe:
    runs-on: windows-latest   # 如果你要运行 Windows 可执行文件，建议用 windows-latest
    # 如果 EXE 是跨平台（.NET Core 等）也可以用 ubuntu-latest，但需确保运行时环境兼容

    steps:
      - name: Checkout target repository (用于后续推送)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest release ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 自动提供的 token，用于身份验证
        run: |
          gh release download --pattern "*windows*.zip" --dir ./downloads --repo Deathemonic/BA-AD

      - name: Extract ZIP
        run: |
          powershell -command "Expand-Archive -Path ./downloads/*.zip -DestinationPath ./extract -Force"

      - name: Find and run EXE
        run: |
          $exePath = Get-ChildItem -Path ./extract -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Running: $($exePath.FullName)"
            & $exePath.FullName download japan --tables --output ./Tables
          } else {
            Write-Error "No EXE found in extracted files"
            exit 1
          }
        shell: pwsh
        
      - name: Upload results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $branch = Get-Date -Format "yyyy-MM-dd-HHmmss"
          Write-Host "Creating new brach from timestamp"
          git checkout --orphan $branch
          git rm -rf .   # 清空工作区（若需要全新分支）


          # 添加生成的文件（根据 file_pattern）
          $pattern = "(*.zip||*.db)"
          # 如果有文件匹配，则添加，否则跳过
          $files = Get-ChildItem -Path $pattern -File
          if ($files.Count -eq 0) {
            Write-Host "No files found matching pattern $pattern, skipping commit."
            exit 0
          }
          git add $pattern

          # 检查是否有变更
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Update generated files from EXE run [skip ci]"
            git push origin $branch
          } else {
            Write-Host "No changes to commit."
          }
